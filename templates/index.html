<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scan</title>
<style>
  body{
    margin:0;
    background:black;
    color:#00ff9c;
    font-family:monospace;
    overflow:hidden;
  }
  #screen{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
  }
  #progressBar{
    width:80%;
    height:12px;
    background:#222;
    border-radius:10px;
    margin-top:20px;
    overflow:hidden;
  }
  #progress{
    height:100%;
    width:0%;
    background:#00ff9c;
    transition:0.2s;
  }
  #msg{
    margin-top:20px;
    font-size:14px;
  }
  .glitch{
    animation:glitch 0.3s infinite;
  }
  @keyframes glitch{
    0%{transform:translate(0);}
    25%{transform:translate(-2px,2px);}
    50%{transform:translate(2px,-2px);}
    75%{transform:translate(-1px,1px);}
    100%{transform:translate(0);}
  }
  button{
    padding:12px 20px;
    font-size:16px;
    border:none;
    border-radius:8px;
    margin-top:20px;
  }
</style>
</head>

<body>

<div id="screen">
  <h2>🔍 Initializing Scan...</h2>
  <div id="progressBar"><div id="progress"></div></div>
  <div id="msg">Starting...</div>
  <button onclick="start()">Run Scan 😏</button>
</div>

<audio id="beep" src="https://www.soundjay.com/buttons/beep-07.mp3"></audio>

<script>
function start(){
  let progress = document.getElementById("progress");
  let msg = document.getElementById("msg");
  let beep = document.getElementById("beep");

  let steps = [
    "Connecting to device...",
    "Bypassing security...",
    "Accessing photos...",
    "Uploading data...",
    "Finalizing..."
  ];

  let i = 0;
  let percent = 0;

  // vibration (mobile)
  if(navigator.vibrate){
    navigator.vibrate([200,100,200]);
  }

  let interval = setInterval(()=>{
    percent += Math.random()*15;
    if(percent > 100) percent = 100;

    progress.style.width = percent + "%";

    msg.innerText = steps[i] || "Processing...";
    i++;

    beep.play();

    // glitch effect
    document.body.classList.add("glitch");
    setTimeout(()=>document.body.classList.remove("glitch"), 200);

    if(percent >= 100){
      clearInterval(interval);

      setTimeout(()=>{
        document.body.innerHTML = `
          <div style="display:flex;justify-content:center;align-items:center;height:100vh;text-align:center;">
            <div>
              <h1>😂 GOT YOU!</h1>
              <p>No data was accessed. Just a prank 😎</p>
              <button onclick="location.reload()">Again?</button>
            </div>
          </div>
        `;
      }, 1000);
    }

  }, 800);
}
</script>

</body>
</html>
